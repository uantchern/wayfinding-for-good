<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>www.charityOps.org | The CharityOps Engine</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['JetBrains Mono', 'monospace'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            base: '#F2EFE9',
                            text: '#1B2B28',
                            accent1: '#D2B48C',
                            accent2: '#8B7355',
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background-color: #F2EFE9;
            color: #1B2B28;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .wave-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            overflow: hidden;
            line-height: 0;
            transform: rotate(180deg);
        }

        .wave-bottom svg {
            position: relative;
            display: block;
            width: calc(100% + 1.3px);
            height: 60px;
        }

        .wave-bottom .shape-fill {
            fill: #1B2B28;
        }

        /* Abstract noise overlay */
        .noise-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Accordion transitions */
        .accordion-content {
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }

        .accordion-content.open {
            max-height: 1000px;
            opacity: 1;
        }
    </style>
</head>

<body class="bg-brand-base text-brand-text font-sans antialiased selection:bg-brand-accent1 selection:text-brand-text">
    <div class="noise-bg"></div>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons
        const ChevronDownIcon = () => <i data-lucide="chevron-down" className="w-5 h-5"></i>;
        const FileTextIcon = () => <i data-lucide="file-text" className="w-5 h-5"></i>;
        const ArrowRightIcon = () => <i data-lucide="arrow-right" className="w-5 h-5"></i>;
        const MapIcon = () => <i data-lucide="map" className="w-5 h-5"></i>;

        const Accordion = ({ title, active, onClick, children }) => (
            <div className="border-b border-brand-text/20">
                <button
                    className="w-full text-left py-6 flex justify-between items-center group focus:outline-none"
                    onClick={onClick}
                >
                    <h3 className="font-serif text-2xl md:text-3xl text-brand-text group-hover:text-brand-accent2 transition-colors">{title}</h3>
                    <div className={\`transform transition-transform duration-300 \${active ? 'rotate-180' : ''}\`}>
                    <ChevronDownIcon />
            </div>
                </button >
            <div className={\`accordion-content \${active ? 'open' : ''}\`}>
                    <div className="pb-8 pt-2 text-brand-text/80 leading-relaxed font-mono text-sm md:text-base pr-8">
                        {children}
                    </div>
                </div>
            </div>
        );

        const Navbar = () => (
            <nav className="w-full z-40 p-6 md:p-10 flex flex-col md:flex-row justify-between items-center relative">
                <div className="font-serif text-3xl font-bold tracking-tight text-brand-text mb-4 md:mb-0">
                    charity<span className="italic text-brand-accent2">Ops</span>
                </div>
                <div className="flex gap-6 font-mono text-xs uppercase tracking-widest text-brand-text/70">
                    <a href="#" className="hover:text-brand-text transition-colors">Manifesto</a>
                    <a href="#" className="hover:text-brand-text transition-colors">Lab</a>
                    <a href="#" className="hover:text-brand-text transition-colors">Contact</a>
                </div>
            </nav>
        );

        const App = () => {
            const [activeAccordion, setActiveAccordion] = useState(0);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeAccordion]);

            const accordions = [
                {
                    title: "Who are We?",
                    content: (
                        <p>We are a dedicated team acting as the autonomous engine for charities. Operations shouldn't drain the empathy and focus of social impact organizations. We streamline systems, build tech, and simplify the back-office so you can get back to what really matters: your core mission.</p>
                    )
                },
                {
                    title: "What are Really Useful Things (RUTs)?",
                    content: (
                        <div className="space-y-4">
                            <p>RUTs are our specialized toolkits and strategies designed to solve specific sector problems. They are practical, robust, and meant to be deployed yesterday.</p>
                            <ul className="list-disc pl-5 mt-2 space-y-2 text-brand-text/90">
                                <li><strong>GovernUp:</strong> An AI-powered governance and compliance framework. <a href="https://www.sscharities.com/governup/" target="_blank" rel="noopener noreferrer" className="underline text-brand-accent2 hover:text-brand-text">Read the Case Study</a></li>
                                <li><strong>Strategy Lab:</strong> A generative space to dismantle old paradigms and run "Question Storming" sessions. <a href="https://uantchern.github.io/question-storming/" target="_blank" rel="noopener noreferrer" className="underline text-brand-accent2 hover:text-brand-text">Try Question Storming</a></li>
                                <li><strong>Wayfinding App:</strong> Navigate the complex Singapore charity ecosystem with visual nodes. <a href="./wayfinding.html" target="_blank" rel="noopener noreferrer" className="underline text-brand-accent2 hover:text-brand-text">Launch Wayfinding App</a></li>
                            </ul>
                        </div>
                    )
                },
                {
                    title: "How does our ecosystem thrive?",
                    content: (
                        <p>Community and collaboration. We believe in open-sourcing non-profit tech, sharing our 'Really Useful Things', and building an interconnected mesh of organizations that lean on each other's operational strengths rather than working in silos.</p>
                    )
                },
                {
                    title: "How does vibe coding play a part?",
                    content: (
                        <p>Vibe coding represents our agile, AI-assisted development philosophy. We don't spend years in committees; we prototype rapidly, test in the real world, and iterate based on the 'vibe' and actual user friction. Modern tools let us move at the speed of thought.</p>
                    )
                },
                {
                    title: "How do I get involved?",
                    content: (
                        <p className="font-bold text-brand-text">
                            We invite stakeholders to participate in wayfinding sessions or back discovery journeys. Involvement begins with curiosity and the willingness to roll a 13.
                        </p>
                    )
                }
            ];

            return (
                <div className="min-h-screen relative flex flex-col">
                    <Navbar />

                    <main className="flex-grow container mx-auto px-6 md:px-12 lg:px-24 mb-32 z-10 relative">
                        {/* Hero Section */}
                        <div className="py-20 md:py-32 max-w-4xl animate-fade-in-up">
                            <div className="inline-block border border-brand-accent2/30 bg-brand-accent1/10 text-brand-accent2 px-3 py-1.5 font-mono text-xs uppercase tracking-widest mb-8 rounded">
                                Welcome to the new standard
                            </div>
                            <h1 className="font-serif text-5xl md:text-7xl lg:text-8xl font-black text-brand-text leading-[1.1] mb-8">
                                We discover <br/>
                                <span className="italic text-brand-accent2">Really Useful Things</span> <br/>
                                for Charities.
                            </h1>
                        </div>

                        {/* Accordion Section */}
                        <div className="max-w-4xl mx-auto mt-12 bg-white/40 backdrop-blur-md border border-white/50 rounded-3xl p-6 md:p-12 shadow-xl shadow-brand-text/5">
                            {accordions.map((acc, idx) => (
                                <Accordion 
                                    key={idx} 
                                    title={acc.title} 
                                    active={activeAccordion === idx} 
                                    onClick={() => setActiveAccordion(idx === activeAccordion ? -1 : idx)}
                                >
                                    {acc.content}
                                </Accordion>
                            ))}
                        </div>
                        
                        {/* Contact Form Section */}
                        <div className="max-w-4xl mx-auto mt-24">
                            <h2 className="font-serif text-4xl text-brand-text mb-8">Let's build together.</h2>
                            <form className="bg-white/40 backdrop-blur-md border border-white/50 p-8 rounded-3xl shadow-xl shadow-brand-text/5 font-mono">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                    <div>
                                        <label className="block text-xs uppercase tracking-widest text-brand-text/60 mb-2">Name</label>
                                        <input type="text" className="w-full bg-brand-base/50 border border-brand-text/20 rounded-lg px-4 py-3 focus:outline-none focus:border-brand-accent2 transition-colors" placeholder="Jane Doe" />
                                    </div>
                                    <div>
                                        <label className="block text-xs uppercase tracking-widest text-brand-text/60 mb-2">Email Address</label>
                                        <input type="email" className="w-full bg-brand-base/50 border border-brand-text/20 rounded-lg px-4 py-3 focus:outline-none focus:border-brand-accent2 transition-colors" placeholder="jane@charity.org" />
                                    </div>
                                </div>
                                <div className="mb-8">
                                    <label className="block text-xs uppercase tracking-widest text-brand-text/60 mb-2">What would you like to do?</label>
                                    <textarea className="w-full bg-brand-base/50 border border-brand-text/20 rounded-lg px-4 py-3 h-32 focus:outline-none focus:border-brand-accent2 transition-colors resize-none" placeholder="I want to..."></textarea>
                                </div>
                                <button type="button" className="bg-brand-text hover:bg-brand-accent2 text-brand-base flex items-center gap-3 px-8 py-4 rounded-xl transition-colors font-bold tracking-wide uppercase text-sm w-full md:w-auto justify-center">
                                    Send Message
                                    <ArrowRightIcon />
                                </button>
                            </form>
                        </div>
                    </main>

                    {/* Footer with Wave */}
                    <footer className="relative mt-24 bg-brand-text pt-24 pb-12 px-6">
                        <div className="wave-bottom top-0 rotate-0">
                            <svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
                                <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z" className="fill-brand-base"></path>
                            </svg>
                        </div>
                        
                        <div className="container mx-auto max-w-4xl relative z-10 flex flex-col md:flex-row justify-between items-center bottom-0">
                            <div className="text-brand-base mb-6 md:mb-0">
                                <div className="font-serif text-2xl font-bold tracking-tight mb-2">
                                    charity<span className="italic text-brand-accent1">Ops</span>
                                </div>
                                <div className="font-mono text-xs text-brand-base/60">
                                    &copy; {new Date().getFullYear()} The CharityOps Engine
                                </div>
                            </div>
                            <div className="flex gap-4">
                                <a href="https://failonpurpose.com" className="w-10 h-10 rounded-full bg-brand-base/10 hover:bg-brand-accent1/20 flex items-center justify-center text-brand-base transition-colors" title="Fail on Purpose">
                                    <FileTextIcon />
                                </a>
                                <a href="./wayfinding.html" className="w-10 h-10 rounded-full bg-brand-base/10 hover:bg-brand-accent1/20 flex items-center justify-center text-brand-base transition-colors" title="Wayfinding App">
                                    <MapIcon />
                                </a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
