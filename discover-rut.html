<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover a RUT! | CharityOps</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#F2EFE9',
                            DEFAULT: '#8B7355',
                            dark: '#1B2B28',
                            muted: '#5E5A4B',
                            accent: '#D2B48C'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Georgia', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Georgia:wght@400;700;900&display=swap');

        body {
            background-color: #F2EFE9;
            color: #1B2B28;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            border-radius: 24px;
        }

        .drag-item {
            cursor: grab;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .drag-item:active {
            cursor: grabbing;
            transform: scale(0.95);
        }

        .drop-zone {
            transition: all 0.3s ease;
        }

        .drop-zone.active {
            border-color: #8B7355;
            background-color: rgba(139, 115, 85, 0.1);
            transform: scale(1.02);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes subtlePulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .animate-pulse-subtle {
            animation: subtlePulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>

<body>
    <div id="root" class="w-full max-w-6xl"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            React.useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const GOALS = [
            { id: 'g1', type: 'goal', title: 'Measure Impact', text: 'assess the impact of what we do', icon: 'target' },
            { id: 'g2', type: 'goal', title: 'Connect People', text: 'match volunteers to events', icon: 'users' },
            { id: 'g3', type: 'goal', title: 'Track Funds', text: 'track incoming donations', icon: 'coins' },
            { id: 'g4', type: 'goal', title: 'Get Feedback', text: 'collect feedback from beneficiaries', icon: 'message-circle' }
        ];

        const INPUTS = [
            { id: 'i1', type: 'input', title: 'Programs', text: 'programs and schedules', icon: 'folder' },
            { id: 'i2', type: 'input', title: 'Profiles', text: 'volunteer skills and availability', icon: 'user-circle' },
            { id: 'i3', type: 'input', title: 'Receipts', text: 'donation amounts and dates', icon: 'receipt' },
            { id: 'i4', type: 'input', title: 'Surveys', text: 'survey responses and comments', icon: 'file-text' }
        ];

        const OUTPUTS = [
            {
                id: 'o1', type: 'output', title: 'Impact Story', text: 'where and how we\\'ve truly made a difference', icon: 'sparkles' },
            { id: 'o2', type: 'output', title: 'Match List', text: 'a list of perfectly matched volunteers', icon: 'list-checks' },
            { id: 'o3', type: 'output', title: 'Financial Summary', text: 'a monthly financial summary', icon: 'pie-chart' },
            { id: 'o4', type: 'output', title: 'Insights', text: 'a report of community satisfaction', icon: 'lightbulb' }
        ];

        const App = () => {
            const [selectedGoal, setSelectedGoal] = useState(null);
            const [selectedInput, setSelectedInput] = useState(null);
            const [selectedOutput, setSelectedOutput] = useState(null);
            const [draggedItem, setDraggedItem] = useState(null);
            const [dragOverZone, setDragOverZone] = useState(null);
            const [appName, setAppName] = useState('');
            const [copyStatus, setCopyStatus] = useState(false);

            const handleDragStart = (e, item) => {
                setDraggedItem(item);
                // Required for Firefox
                e.dataTransfer.setData('text/plain', item.id);
            };

            const handleDragOver = (e, zoneType) => {
                e.preventDefault();
                if (draggedItem && draggedItem.type === zoneType) {
                    setDragOverZone(zoneType);
                }
            };

            const handleDragLeave = () => {
                setDragOverZone(null);
            };

            const handleDrop = (e, zoneType) => {
                e.preventDefault();
                setDragOverZone(null);
                if (draggedItem && draggedItem.type === zoneType) {
                    if (zoneType === 'goal') setSelectedGoal(draggedItem);
                    if (zoneType === 'input') setSelectedInput(draggedItem);
                    if (zoneType === 'output') setSelectedOutput(draggedItem);
                }
                setDraggedItem(null);
            };

            const handleTileClick = (item) => {
                if (item.type === 'goal') setSelectedGoal(item);
                if (item.type === 'input') setSelectedInput(item);
                if (item.type === 'output') setSelectedOutput(item);
            };

            const handleRemove = (zoneType) => {
                if (zoneType === 'goal') setSelectedGoal(null);
                if (zoneType === 'input') setSelectedInput(null);
                if (zoneType === 'output') setSelectedOutput(null);
            };

            const generatedPrompt = (selectedGoal && selectedInput && selectedOutput) ?\`Dear Santa,

I wish for a magical digital notebook called "\${appName || 'My Magic Tool'}" for my charity that helps us \${selectedGoal.text}. Instead of getting lost in complicated data, I just want to tell the notebook what \${selectedInput.text} we're running. It then transforms that information into an encouraging story about \${selectedOutput.text}. Once we see the impact we've made, I wish for a way to instantly text that "good news" story to our team via WhatsApp to celebrate together.

Santa, I don't want any complicated technical stuff—just a magical present that works right out of the box!

Here is how I wish it to look: wrapped in a beautiful translucent glass-panel container (blur, semi-transparent white, subtle borders) floating over a light beige (#F2EFE9) background. I'd love it if you use Inter for normal text and Georgia for headers, and paint it with earthy colors like deep emerald (#1B2B28), muted brown (#8B7355), and warm beige (#D2B48C).

It must work immediately without any passwords or logins, and it must do exactly this one thing and do it exceptionally well.

Please just give me the final gift exactly as one complete file starting with <!DOCTYPE html> so I can open it and see the magic right away!

Thank you, Santa!\` : '';

            const handleCopy = () => {
                if (!generatedPrompt) return;
                navigator.clipboard.writeText(generatedPrompt).then(() => {
                    setCopyStatus(true);
                    setTimeout(() => setCopyStatus(false), 2000);
                });
            };

            const shareToWhatsApp = () => {
                if (!generatedPrompt) return;
                window.open(\`https://wa.me/?text=\${encodeURIComponent(generatedPrompt)}\`, '_blank');
            };

            const DraggableTile = ({ item }) => (
                <div 
                    draggable 
                    onDragStart={(e) => handleDragStart(e, item)}
                    onClick={() => handleTileClick(item)}
                    className="drag-item bg-white/80 p-3 rounded-xl border border-brand-accent/30 shadow-sm flex flex-col items-center justify-center text-center gap-2 hover:bg-brand-accent/10 hover:border-brand-accent w-full aspect-square cursor-pointer transition-all hover:-translate-y-1 hover:shadow-md"
                >
                    <div className="w-10 h-10 rounded-full bg-brand-light flex items-center justify-center text-brand">
                        <Icon name={item.icon} size={20} />
                    </div>
                    <div className="text-xs font-semibold text-brand-dark leading-tight">{item.title}</div>
                </div>
            );

            const DropZone = ({ type, title, icon, selectedItem, options }) => {
                const isActive = dragOverZone === type;
                return (
                    <div className="flex flex-col gap-3 w-full">
                        <div className="text-xs font-bold tracking-wider text-brand-dark uppercase flex flex-col md:flex-row items-baseline gap-2">
                             <span className="flex items-center gap-1"><Icon name={icon} size={14} className="text-brand" /> {title}</span>
                             <span className="text-[10px] text-brand-muted font-normal normal-case opacity-70">(Click or drag a path here)</span>
                        </div>
                        
                        <div 
                            onDragOver={(e) => handleDragOver(e, type)}
                            onDragLeave={handleDragLeave}
                            onDrop={(e) => handleDrop(e, type)}
                            className={\`drop-zone border-2 border-dashed rounded-2xl flex flex-col items-center justify-center transition-all \${selectedItem ? 'p-0 border-transparent bg-transparent' : 'p-4 min-h-[120px] bg-white/30'} \${isActive && !selectedItem ? 'active' : 'border-brand-accent/40'}\`}
                        >
                            {selectedItem ? (
                                <div className="bg-brand-dark text-white p-4 rounded-xl shadow-lg flex items-center justify-between w-full animate-fade-in relative group border border-brand-dark/50">
                                    <div className="flex items-center gap-4">
                                        <div className="p-2.5 bg-white/10 rounded-lg text-brand-accent">
                                            <Icon name={selectedItem.icon} size={22} />
                                        </div>
                                        <div className="flex flex-col">
                                            <div className="text-xs text-brand-accent/70 uppercase tracking-wider font-bold mb-0.5">{title}</div>
                                            <div className="text-sm font-medium">{selectedItem.title}</div>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); handleRemove(type); }}
                                        className="text-white/30 hover:text-white transition-colors p-2 hover:bg-white/10 rounded-full"
                                        title="Remove selection"
                                    >
                                        <Icon name="x" size={18} />
                                    </button>
                                </div>
                            ) : (
                                <div className="text-brand-muted/50 text-sm font-medium flex flex-col items-center gap-2 pointer-events-none">
                                    <Icon name="grid" size={24} className="opacity-50" />
                                    <span>Empty Space</span>
                                </div>
                            )}
                        </div>
                        
                        {!selectedItem && (
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mt-2 animate-fade-in">
                                {options.map(opt => <DraggableTile key={opt.id} item={opt} />)}
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="glass-panel overflow-hidden flex flex-col lg:flex-row min-h-[750px] animate-fade-in w-full items-stretch">
                    {/* Setup Pane */}
                    <div className="p-8 lg:p-10 w-full lg:w-1/2 flex-shrink-0 overflow-y-auto z-10 flex flex-col">
                        <div className="mb-6 border-b border-brand-accent/20 pb-6">
                            <div className="text-brand-accent font-bold text-xs tracking-widest uppercase mb-2 flex items-center gap-2">
                                <Icon name="compass" size={14} />
                                Discover the Destination
                            </div>
                            <h1 className="font-serif text-3xl md:text-4xl font-black text-brand-dark mb-3 leading-tight">
                                Don't pick the path because of the destination...
                            </h1>
                            <p className="text-brand-muted text-[15px] leading-relaxed italic">
                                "...discover the destination because of the path." Build your perfect RUT visually by dragging or clicking the pieces of your journey into place. Minimal typing required.
                            </p>
                        </div>

                        <div className="flex-1 space-y-8">
                            <DropZone 
                                type="goal" 
                                title="1. The Goal" 
                                icon="target"
                                selectedItem={selectedGoal} 
                                options={GOALS} 
                            />
                            
                            <DropZone 
                                type="input" 
                                title="2. The Inputs" 
                                icon="inbox"
                                selectedItem={selectedInput} 
                                options={INPUTS} 
                            />
                            
                            <DropZone 
                                type="output" 
                                title="3. The Output" 
                                icon="sparkles"
                                selectedItem={selectedOutput} 
                                options={OUTPUTS} 
                            />
                        </div>
                    </div>

                    {/* Output Pane */}
                    <div className="w-full lg:w-1/2 bg-brand-dark flex flex-col relative overflow-hidden border-t lg:border-t-0 lg:border-l border-brand-accent/20 shadow-[-10px_0_30px_rgba(0,0,0,0.1)]">
                        <div className="bg-[#15211f] py-4 px-6 flex items-center justify-between text-white sticky top-0 z-10 shadow-md">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full bg-brand flex items-center justify-center font-bold text-xs ring-2 ring-brand-accent/30 shadow-inner">
                                    DA
                                </div>
                                <h2 className="font-serif font-semibold text-lg tracking-wide">AI Prompt Compiler</h2>
                            </div>
                            {generatedPrompt && (
                                <div className="flex items-center space-x-2">
                                    <button
                                        onClick={handleCopy}
                                        className={"text-sm flex items-center space-x-2 px-3 py-1.5 rounded-lg border transition-all " + (copyStatus ? 'bg-green-500/20 text-green-300 border-green-500/50' : 'bg-white/10 text-brand-light border-white/20 hover:bg-white/20')}
                                    >
                                        <Icon name={copyStatus ? "check" : "copy"} size={16} />
                                        <span className="hidden sm:inline">{copyStatus ? "Copied!" : "Copy"}</span>
                                    </button>
                                    <button
                                        onClick={shareToWhatsApp}
                                        className="text-sm flex items-center space-x-2 px-3 py-1.5 rounded-lg border bg-[#25D366]/20 text-[#25D366] border-[#25D366]/50 hover:bg-[#25D366]/30 transition-all font-semibold"
                                    >
                                        <Icon name="message-circle" size={16} />
                                        <span className="hidden sm:inline">WhatsApp</span>
                                    </button>
                                </div>
                            )}
                        </div>

                        <div className="flex-1 p-6 md:p-8 overflow-y-auto relative flex flex-col">
                            {(!selectedGoal || !selectedInput || !selectedOutput) ? (
                                <div className="flex-1 flex flex-col items-center justify-center text-center opacity-70 max-w-sm mx-auto animate-fade-in m-auto mt-20">
                                    <div className="w-24 h-24 rounded-full bg-brand-accent/10 flex items-center justify-center mb-6 text-brand-accent border border-brand-accent/20 shadow-[0_0_40px_rgba(210,180,140,0.15)] relative">
                                        <Icon name="sparkles" size={40} className="animate-pulse-subtle" />
                                    </div>
                                    <h3 className="text-2xl font-serif text-white mb-3 font-semibold">The Magic Awaits</h3>
                                    <p className="text-brand-light/60 text-sm leading-relaxed">
                                        Drag and drop your desired paths on the left to complete your journey. Once you select all three, your magical letter will appear here.
                                    </p>
                                </div>
                            ) : (
                                <div className="flex-1 flex flex-col animate-fade-in relative z-10 w-full h-full space-y-6">
                                    <div className="bg-white/5 p-5 rounded-xl border border-white/10 flex flex-col gap-3 shadow-inner">
                                        <label className="text-xs font-bold tracking-wider text-brand-accent uppercase flex items-center gap-2">
                                            <Icon name="pen-tool" size={14} /> Name Your Creation (Optional)
                                        </label>
                                        <input
                                            type="text"
                                            className="w-full bg-transparent border-b-2 border-brand-accent/40 text-white pb-2 focus:outline-none focus:border-brand-accent transition-colors placeholder-white/20 text-xl font-serif"
                                            placeholder="e.g., The Impactor"
                                            value={appName}
                                            onChange={(e) => setAppName(e.target.value)}
                                        />
                                    </div>
                                    <div className="flex-1 flex flex-col relative h-full min-h-[400px]">
                                        <textarea
                                            readOnly
                                            className="w-full h-full absolute inset-0 p-6 rounded-xl bg-[#0f1816] text-[#6ee7b7] font-mono text-[14px] leading-relaxed shadow-inner border border-white/5 focus:outline-none resize-none"
                                            value={generatedPrompt}
                                        />
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const rootLayout = document.getElementById('root');
        const root = ReactDOM.createRoot(rootLayout);
        root.render(<App />);
    </script>
</body>

</html>
