<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover a RUT! | CharityOps</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#F2EFE9',
                            DEFAULT: '#8B7355',
                            dark: '#1B2B28',
                            muted: '#5E5A4B',
                            accent: '#D2B48C'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Georgia', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            background-color: #F2EFE9;
            color: #1B2B28;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            border-radius: 24px;
        }

        .card-shadow {
            box-shadow: 0 10px 30px rgba(27, 43, 40, 0.08);
            border: 1px solid rgba(210, 180, 140, 0.3);
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 24px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        textarea,
        input {
            font-family: inherit;
        }
    </style>
</head>

<body>
    <div id="root" class="w-full max-w-5xl"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            React.useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [appName, setAppName] = useState('');
            const [goal, setGoal] = useState('');
            const [inputs, setInputs] = useState('');
            const [output, setOutput] = useState('');
            const [tone, setTone] = useState('');

            const [generatedPrompt, setGeneratedPrompt] = useState('');
            const [copyStatus, setCopyStatus] = useState(false);

            const handleGenerate = (e) => {
                e.preventDefault();

                const promptTemplate = `Hi! I need you to build a new mini web app (a Really Useful Thing) for CharityOps. Please create a single-file, standalone HTML web application using React and Tailwind CSS.
                
Here are the design rules to follow:
1. Glass-Panel UI: Wrap the app in a translucent glass-panel container (blur, semi-transparent white, subtle borders) floating over a light beige (#F2EFE9) background.
2. Typography: Use Inter for normal text and Georgia for headers. Use earthy colors like deep emerald (#1B2B28), muted brown (#8B7355), and warm beige (#D2B48C).
3. No Login: It must work immediately without any passwords or backend.
4. Single-Purpose: It must do EXACTLY one thing and do it exceptionally well.
5. Simple Output & Sharing: The app's generated output must be in plain English. Also, always include a button to let the user easily share their results via WhatsApp.

APP DETAILS:
- App Name: ${appName || 'Untitled App'}
- Core Goal: ${goal || 'Automate a task'}
- Required User Inputs: ${inputs || 'A few text fields'}
- Desired Output: ${output || 'A plain English summary'}
- Style/Tone: ${tone || 'Professional yet approachable'}

Please output ONLY the complete HTML code starting with <!DOCTYPE html> so I can save and run it immediately.`;

                setGeneratedPrompt(promptTemplate);
                setCopyStatus(false);
            };

            const handleCopy = () => {
                if (!generatedPrompt) return;
                navigator.clipboard.writeText(generatedPrompt).then(() => {
                    setCopyStatus(true);
                    setTimeout(() => setCopyStatus(false), 2000);
                });
            };

            const shareToWhatsApp = () => {
                if (!generatedPrompt) return;
                window.open(`https://wa.me/?text=${encodeURIComponent(generatedPrompt)}`, '_blank');
            };

            return (
                <div className="glass-panel overflow-hidden flex flex-col md:flex-row min-h-[650px] animate-fade-in w-full">
                    {/* Setup Pane */}
                    <div className="card-shadow p-8 md:p-10 w-full md:w-[450px] flex-shrink-0 overflow-y-auto z-10">
                        <div className="mb-8">
                            <div className="text-brand-accent font-bold text-xs tracking-widest uppercase mb-1 flex items-center gap-2">
                                <Icon name="sparkles" size={14} />
                                Idea to Prompt
                            </div>
                            <h1 className="font-serif text-3xl font-black text-brand-dark mb-4 leading-tight">
                                Discover a RUT!
                            </h1>
                            <p className="text-brand-muted text-sm leading-relaxed">
                                Outline what you want to automate, and we'll generate the perfect prompt to feed to your Antigravity AI to build a new "Really Useful Thing" app.
                            </p>
                        </div>

                        <form onSubmit={handleGenerate} className="space-y-6">
                            <div>
                                <label className="text-xs font-bold tracking-wider text-brand-dark uppercase">
                                    RUT App Name
                                </label>
                                <input
                                    type="text"
                                    className="mt-2 w-full p-3 rounded-xl border border-brand-accent/40 bg-white/60 text-brand-dark text-sm focus:outline-none focus:border-brand transition-colors placeholder-brand-muted/60"
                                    placeholder="e.g., Volunteer Matcher"
                                    value={appName}
                                    onChange={(e) => setAppName(e.target.value)}
                                    required
                                    autoFocus
                                />
                            </div>

                            <div>
                                <label className="text-xs font-bold tracking-wider text-brand-dark uppercase">
                                    Core User Goal
                                </label>
                                <textarea
                                    className="mt-2 w-full p-3 rounded-xl border border-brand-accent/40 bg-white/60 text-brand-dark text-sm focus:outline-none focus:border-brand transition-colors placeholder-brand-muted/60 resize-none h-20"
                                    placeholder="e.g., Quickly pair new volunteers with current pressing events..."
                                    value={goal}
                                    onChange={(e) => setGoal(e.target.value)}
                                    required
                                />
                            </div>

                            <div>
                                <label className="text-xs font-bold tracking-wider text-brand-dark uppercase">
                                    Source Inputs
                                </label>
                                <textarea
                                    className="mt-2 w-full p-3 rounded-xl border border-brand-accent/40 bg-white/60 text-brand-dark text-sm focus:outline-none focus:border-brand transition-colors placeholder-brand-muted/60 resize-none h-20"
                                    placeholder="e.g., Volunteer skill set dropdown, date availability..."
                                    value={inputs}
                                    onChange={(e) => setInputs(e.target.value)}
                                    required
                                />
                            </div>

                            <div>
                                <label className="text-xs font-bold tracking-wider text-brand-dark uppercase">
                                    Desired Output
                                </label>
                                <textarea
                                    className="mt-2 w-full p-3 rounded-xl border border-brand-accent/40 bg-white/60 text-brand-dark text-sm focus:outline-none focus:border-brand transition-colors placeholder-brand-muted/60 resize-none h-20"
                                    placeholder="e.g., A perfectly formatted email ready to be sent..."
                                    value={output}
                                    onChange={(e) => setOutput(e.target.value)}
                                    required
                                />
                            </div>

                            <div>
                                <label className="text-xs font-bold tracking-wider text-brand-dark uppercase">
                                    Specific Rules / Tone
                                </label>
                                <textarea
                                    className="mt-2 w-full p-3 rounded-xl border border-brand-accent/40 bg-white/60 text-brand-dark text-sm focus:outline-none focus:border-brand transition-colors placeholder-brand-muted/60 resize-none h-16"
                                    placeholder="e.g., Keep it extremely encouraging and short..."
                                    value={tone}
                                    onChange={(e) => setTone(e.target.value)}
                                />
                            </div>

                            <button
                                type="submit"
                                disabled={!appName.trim() || !goal.trim()}
                                className={"mt-4 w-full py-4 rounded-xl text-white font-semibold flex items-center justify-center gap-2 transition-all " + (!appName.trim() || !goal.trim() ? 'bg-brand/50 cursor-not-allowed' : 'bg-brand-dark hover:bg-black hover:shadow-lg')}
                            >
                                <Icon name="wand-2" size={18} />
                                Generate Prompt
                            </button>
                        </form>
                    </div>

                    {/* Editor / Output Pane */}
                    <div className="flex-1 bg-white/40 flex flex-col relative overflow-hidden">
                        <div className="bg-brand-dark py-4 px-6 flex items-center justify-between text-white sticky top-0 z-10 shadow-md">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full bg-brand flex items-center justify-center font-bold text-xs ring-2 ring-brand-accent/30 shadow-inner">
                                    DA
                                </div>
                                <h2 className="font-serif font-semibold text-lg tracking-wide">AI Prompt Compiler</h2>
                            </div>
                            {generatedPrompt && (
                                <div className="flex items-center space-x-2">
                                    <button
                                        onClick={handleCopy}
                                        className={"text-sm flex items-center space-x-2 px-3 py-1.5 rounded-lg border transition-all " + (copyStatus ? 'bg-green-500/20 text-green-300 border-green-500/50' : 'bg-white/10 text-brand-light border-white/20 hover:bg-white/20')}
                                    >
                                        <Icon name={copyStatus ? "check" : "copy"} size={16} />
                                        <span>{copyStatus ? "Copied!" : "Copy"}</span>
                                    </button>
                                    <button
                                        onClick={shareToWhatsApp}
                                        className="text-sm flex items-center space-x-2 px-3 py-1.5 rounded-lg border bg-[#25D366]/20 text-[#25D366] border-[#25D366]/50 hover:bg-[#25D366]/30 transition-all font-semibold"
                                    >
                                        <Icon name="message-circle" size={16} />
                                        <span>WhatsApp</span>
                                    </button>
                                </div>
                            )}
                        </div>

                        <div className="flex-1 p-6 md:p-8 overflow-y-auto relative min-h-[400px]">
                            {!generatedPrompt ? (
                                <div className="h-full flex flex-col items-center justify-center text-center opacity-60 max-w-sm mx-auto">
                                    <div className="w-20 h-20 rounded-full bg-brand-light/80 flex items-center justify-center mb-6 text-brand">
                                        <Icon name="terminal" size={32} />
                                    </div>
                                    <h3 className="text-xl font-serif text-brand-dark mb-2 font-semibold">Ready to compile</h3>
                                    <p className="text-brand-muted text-sm leading-relaxed">
                                        Fill out the parameters on the left to structure the perfect instruction set for Antigravity.
                                    </p>
                                </div>
                            ) : (
                                <div className="h-full flex flex-col animate-fade-in relative z-10 w-full max-w-3xl mx-auto">
                                    <textarea
                                        readOnly
                                        className="w-full h-full min-h-[400px] p-6 rounded-xl bg-brand-dark text-green-400 font-mono text-sm leading-relaxed shadow-inner focus:outline-none resize-none"
                                        value={generatedPrompt}
                                    />
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const rootLayout = document.getElementById('root');
        const root = ReactDOM.createRoot(rootLayout);
        root.render(<App />);
    </script>
</body>

</html>
