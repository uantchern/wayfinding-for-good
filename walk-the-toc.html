<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looking for Impact | CharityOps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #F4FBF7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #064E3B; /* tailwind emerald-900 */
        }
        
        .card-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(6, 78, 59, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.1);
        }

        /* Interactive Buttons */
        .area-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            background: white;
            color: #475569;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .area-btn:hover {
            border-color: #10B981;
            background: #F0FDF4;
        }

        .area-btn.selected {
            border-color: #059669;
            background: #D1FAE5;
            color: #064E3B;
            box-shadow: 0 4px 6px -1px rgba(5, 150, 105, 0.1);
        }

        .impact-btn {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            padding: 16px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .impact-btn:hover {
            border-color: #F59E0B;
            background: #FFFBEB;
        }

        .impact-btn.selected {
            border-color: #D97706;
            background: #FEF3C7;
            box-shadow: 0 4px 6px -1px rgba(217, 119, 6, 0.1);
        }

        .impact-title {
            font-weight: 700;
            color: #1E293B;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .impact-hint {
            font-size: 13px;
            color: #64748B;
            font-weight: 500;
        }

        .impact-btn.selected .impact-title {
            color: #92400E;
        }
        
        .impact-btn.selected .impact-hint {
            color: #B45309;
        }

        /* Inputs */
        textarea {
            width: 100%;
            padding: 16px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            resize: vertical;
            outline: none;
            transition: all 0.2s ease;
        }

        textarea:focus {
            border-color: #059669;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        /* Primary Action */
        .share-btn {
            width: 100%;
            padding: 16px;
            background: #25D366; /* WhatsApp Green */
            color: white;
            font-weight: bold;
            font-size: 16px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }

        .share-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 211, 102, 0.4);
            background: #128C7E;
        }

        .share-btn:disabled {
            background: #94A3B8;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
        }

        /* Hide elements by default */
        .hidden-step {
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .visible-step {
            display: block;
            opacity: 1;
        }
    </style>
</head>

<body class="p-4 md:p-8 flex flex-col items-center">

    <!-- Header -->
    <div class="max-w-2xl w-full text-center mt-4 mb-8">
        <h1 class="text-3xl md:text-4xl font-black text-[#064E3B] tracking-tight mb-2 font-serif">Looking for Impact</h1>
        <p class="text-[#047857] font-medium text-sm md:text-base">Quick-log your daily wins and share them with the sector.</p>
        <button onclick="location.reload()" class="mt-4 text-xs font-bold uppercase tracking-wider text-emerald-600 hover:text-emerald-800 flex items-center justify-center gap-1 mx-auto">
            <i data-lucide="rotate-ccw" class="w-3 h-3"></i> Reset Tracker
        </button>
    </div>

    <!-- Main App Container -->
    <div class="max-w-2xl w-full card-container p-6 md:p-8 mb-12">
        
        <!-- STEP 1: CHOOSE AREA -->
        <div class="mb-10" id="step-1">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-8 h-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-bold">1</div>
                <h2 class="text-lg font-bold text-slate-800">Choose the operational area</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <button type="button" class="area-btn" onclick="selectArea('FUND RAISING', this)">
                    <i data-lucide="heart" class="text-rose-500 w-5 h-5"></i> FUND RAISING
                </button>
                <button type="button" class="area-btn" onclick="selectArea('GOVERNANCE', this)">
                    <i data-lucide="shield-check" class="text-blue-500 w-5 h-5"></i> GOVERNANCE
                </button>
                <button type="button" class="area-btn" onclick="selectArea('BOARD MATTERS', this)">
                    <i data-lucide="briefcase" class="text-slate-500 w-5 h-5"></i> BOARD MATTERS
                </button>
                <button type="button" class="area-btn" onclick="selectArea('PROGRAMMES', this)">
                    <i data-lucide="layout" class="text-emerald-500 w-5 h-5"></i> PROGRAMMES
                </button>
                <button type="button" class="area-btn" onclick="selectArea('STAFF', this)">
                    <i data-lucide="users" class="text-amber-500 w-5 h-5"></i> STAFF
                </button>
            </div>
        </div>

        <!-- STEP 2: SPOT IMPACT (Hidden until Step 1) -->
        <div class="hidden-step mb-10" id="step-2">
            <hr class="border-emerald-50 mb-8">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-8 h-8 rounded-full bg-amber-100 text-amber-700 flex items-center justify-center font-bold">2</div>
                <h2 class="text-lg font-bold text-slate-800">Identify the 4A impact type</h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <button type="button" class="impact-btn" onclick="selectImpact('Attitude (Mindset)', this)">
                    <span class="impact-title">Attitude</span>
                    <span class="impact-hint" id="hint-attitude">Changing mindsets</span>
                </button>
                <button type="button" class="impact-btn" onclick="selectImpact('Ability (Skills)', this)">
                    <span class="impact-title">Ability</span>
                    <span class="impact-hint" id="hint-ability">Building skills</span>
                </button>
                <button type="button" class="impact-btn" onclick="selectImpact('Access (Barriers)', this)">
                    <span class="impact-title">Access</span>
                    <span class="impact-hint" id="hint-access">Removing barriers</span>
                </button>
                <button type="button" class="impact-btn" onclick="selectImpact('Action (Behavior)', this)">
                    <span class="impact-title">Action</span>
                    <span class="impact-hint" id="hint-action">Changing behavior</span>
                </button>
            </div>
        </div>

        <!-- STEP 3: CONTEXT & SHARE (Hidden until Step 2) -->
        <div class="hidden-step" id="step-3">
            <hr class="border-emerald-50 mb-8">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-8 h-8 rounded-full bg-slate-100 text-slate-700 flex items-center justify-center font-bold">3</div>
                <h2 class="text-lg font-bold text-slate-800">Add context and share</h2>
            </div>
            
            <textarea id="userNotes" rows="3" placeholder="What exactly happened? Why does it matter?" class="mb-6"></textarea>
            
            <button onclick="generateWhatsApp()" id="shareBtn" class="share-btn" disabled>
                <i data-lucide="send" class="w-5 h-5"></i> Send to WhatsApp
            </button>
        </div>

    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Application State
        const state = {
            area: null,
            impactType: null,
            ncssAlignment: null
        };

        // Data Mapping (20 Scenarios)
        const impactMap = {
            "FUND RAISING": {
                attitude: "Changed a donor's mindset",
                ability: "Team learned new tool",
                access: "Opened new giving channel",
                action: "Converted 1-time to recurring",
                st: "Collaborative Ecosystem"
            },
            "GOVERNANCE": {
                attitude: "Staff value compliance",
                ability: "Trained on COI/Audit",
                access: "Simpler digital workflows",
                action: "Zero-finding audit completion",
                st: "Impactful Entities"
            },
            "BOARD MATTERS": {
                attitude: "Board saw ground reality",
                ability: "Board upskilled (e.g. AI)",
                access: "Better Staff-Board comms",
                action: "Approved 3-year Roadmap",
                st: "Impactful Entities"
            },
            "PROGRAMMES": {
                attitude: "Beneficiary felt hope",
                ability: "Beneficiary learned skill",
                access: "Removed logistics barrier",
                action: "Beneficiary became volunteer",
                st: "Empowered Individuals"
            },
            "STAFF": {
                attitude: "Improved team morale",
                ability: "Staff attended training",
                access: "Centralized knowledge bank",
                action: "Piloted faster intake process",
                st: "Empowered Individuals"
            }
        };

        function selectArea(areaName, btnElement) {
            state.area = areaName;
            state.ncssAlignment = impactMap[areaName].st;
            
            // UI Toggle for Area
            document.querySelectorAll('.area-btn').forEach(btn => btn.classList.remove('selected'));
            btnElement.classList.add('selected');

            // Populate text hints dynamically in Step 2
            document.getElementById('hint-attitude').innerText = impactMap[areaName].attitude;
            document.getElementById('hint-ability').innerText = impactMap[areaName].ability;
            document.getElementById('hint-access').innerText = impactMap[areaName].access;
            document.getElementById('hint-action').innerText = impactMap[areaName].action;

            // Reset step 2 UI if user goes back
            document.querySelectorAll('.impact-btn').forEach(btn => btn.classList.remove('selected'));
            state.impactType = null;
            document.getElementById('shareBtn').disabled = true;

            // Show Step 2
            const step2 = document.getElementById('step-2');
            step2.classList.remove('hidden-step');
            step2.classList.add('visible-step');
            
            // Scroll to Step 2 smoothly
            setTimeout(() => {
                step2.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 50);
        }

        function selectImpact(impactType, btnElement) {
            state.impactType = impactType;

            // UI Toggle for Impact
            document.querySelectorAll('.impact-btn').forEach(btn => btn.classList.remove('selected'));
            btnElement.classList.add('selected');

            // Show Step 3
            const step3 = document.getElementById('step-3');
            step3.classList.remove('hidden-step');
            step3.classList.add('visible-step');

            // Enable share button
            document.getElementById('shareBtn').disabled = false;

            // Pre-fill notes if empty
            const notesField = document.getElementById('userNotes');
            if (notesField.value === "") {
                const hint = btnElement.querySelector('.impact-hint').innerText;
                notesField.placeholder = `e.g. ${hint} because we...`;
            }

            // Scroll to Step 3 smoothly
            setTimeout(() => {
                step3.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 50);
        }

        function generateWhatsApp() {
            const notes = document.getElementById('userNotes').value.trim();
            if (!state.area || !state.impactType) return;

            const text = `> *🌟 Daily Impact Pulse*\n> *Area:* ${state.area}\n> *Type:* ${state.impactType}\n> *Insight:* ${notes ? notes : "Checked in via tracker."}\n> *Alignment:* This supports the NCSS 4ST goal of ${state.ncssAlignment}.`;
            
            const whatsappUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;
            window.location.assign(whatsappUrl);
        }
    </script>
</body>
</html>
