<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PURPOSELY - WhatsApp Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #202c33;
            color: white;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        .phone-container {
            display: flex;
            flex-direction: row;
            gap: 30px;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            max-height: 850px;
            min-height: 600px;
        }

        .phone-frame {
            width: 380px;
            height: 100%;
            background-color: #0b141a;
            border-radius: 40px;
            border: 12px solid #111b21;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
        }

        .whatsapp-header {
            background-color: #202c33;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #2f3b43;
        }

        .chat-bg {
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-color: #0b141a;
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        .bubble.ai {
            background-color: #202c33;
            color: #e9edef;
            align-self: flex-start;
            border-top-left-radius: 0;
            box-shadow: 0 1px 0.5px rgba(11, 20, 26, .13);
        }

        .bubble.user {
            background-color: #005c4b;
            color: #e9edef;
            align-self: flex-end;
            border-top-right-radius: 0;
            box-shadow: 0 1px 0.5px rgba(11, 20, 26, .13);
        }

        .timestamp {
            display: block;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-align: right;
            margin-top: 4px;
        }

        .input-area {
            background-color: #202c33;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 0px;
            flex-shrink: 0;
        }

        .input-box {
            flex: 1;
            background-color: #2a3942;
            border-radius: 24px;
            padding: 12px 20px;
            border: none;
            color: white;
            font-size: 15px;
            resize: none;
            overflow: hidden;
            height: 44px;
            outline: none;
        }

        .send-btn {
            background-color: #00a884;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: white;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background-color: #008f6f;
        }

        .mic-btn {
            background-color: #202c33;
            color: #8696a0;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            font-size: 1.25rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .mic-btn:hover:not(:disabled) {
            background-color: #2a3942;
        }

        .mic-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Debug/Setup Drawer */
        .debug-drawer {
            background: #1e293b;
            border-radius: 16px;
            padding: 30px;
            width: 350px;
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto;
            display: none;
            flex-shrink: 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .debug-drawer.open {
            display: block;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            body {
                padding: 0;
                overflow: hidden;
            }

            .phone-container {
                height: 100dvh;
                max-height: 100dvh;
                min-height: auto;
                gap: 0;
            }

            .phone-frame {
                width: 100%;
                height: 100dvh;
                max-height: none;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }

            .debug-drawer {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100dvh;
                border-radius: 0;
                z-index: 50;
            }
        }
    </style>
</head>

<body>

    <div class="phone-container">
        <!-- Developer Settings Drawer -->
        <div class="debug-drawer" id="debugDrawer">
            <h2 class="text-2xl font-bold text-white mb-6">Module Setup</h2>

            <div class="mb-6 space-y-3">
                <input type="text" id="setupCharity" placeholder="Charity Name"
                    class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 transition-colors"
                    oninput="localStorage.setItem('charityName', this.value)" />
            </div>

            <!-- API Key input removed to ensure full privacy and offline-capability -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-400 mb-3">Select a Principle to begin</label>
                <div id="principlesContainer"></div>
            </div>

            <!-- Push to NotebookLM button removed by request; transcript now downloads automatically at module completion -->
        </div>

        <!-- The Phone -->
        <div class="phone-frame">
            <div class="whatsapp-header">
                <button onclick="document.getElementById('debugDrawer').classList.toggle('open')"
                    class="text-white hover:text-gray-300 mr-4">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <div
                    class="w-10 h-10 rounded-full bg-teal-700 flex items-center justify-content-center text-xl font-bold border border-teal-500 overflow-hidden mr-3">
                    <img src="https://ui-avatars.com/api/?name=Purposely+AI&background=0284c7&color=fff"
                        class="w-full h-full object-cover">
                </div>
                <div class="flex-1">
                    <h2 class="text-white font-semibold text-lg leading-tight">PURPOSELY</h2>
                    <p class="text-gray-400 text-sm leading-tight">Governance Partner • Online</p>
                </div>
            </div>

            <!-- 11-Step Breadcrumb Tracker -->
            <div id="breadcrumbTracker" class="hidden w-full bg-[#1b252b] px-4 py-3 border-b border-[#2f3b43]">
                <div
                    class="flex justify-between items-center text-[10px] text-gray-400 font-bold tracking-wider uppercase mb-2">
                    <span>1. Scenario</span>
                    <span>Q-Storming Loop</span>
                    <span>11. Final</span>
                </div>
                <div class="flex gap-1.5 w-full" id="breadcrumbBars"></div>
            </div>

            <div class="chat-bg" id="chatWindow">
                <div class="w-full flex justify-center mt-2 mb-4">
                    <span class="bg-[#182229] px-4 py-1.5 rounded-lg text-xs text-gray-400 shadow-sm">Today</span>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" class="input-box" placeholder="Type your question..."
                    onkeypress="handleEnter(event)" disabled>
                <button class="mic-btn" onclick="toggleVoice()" id="micBtn" disabled>
                    <i class="fas fa-microphone"></i>
                </button>
                <button class="send-btn" onclick="sendMessage()" id="sendBtn" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const SYSTEM_PROMPT = `You are the Senior Governance Architect acting as a 'Critical Friend' to a charity board director in Singapore. 
Your tone must be professional, demanding but polite, and deeply contextualized to Singapore's charity sector (Commissioner of Charities, IPC regulations, PDPA, NCSS Code of Governance).
You will receive the scenario dilemma, the current Challenge Stage logic, and the Director's query.
Keep your response under 80 words. Adopt a conversational WhatsApp-friendly tone. Ask EXACTLY ONE challenging follow-up question in return. Do NOT grade or praise them excessively. Challenge them to think deeper.`;

        const scenarios = {
            "1": {
                title: "Principle 1: The charity serves its mission and achieves its objectives.",
                dilemma: "A corporate donor offers a $500k restricted grant, but stipulations require diverting 40% of funds to launch an unrelated youth mentorship program. The management team is eager to accept, but it fundamentally distracts from your core elderly care mission.\n\n*What is your first question?*",
                challenges: [
                    "Evaluate their very first question. Smart Prompt: Challenge them to strictly align their thinking with the core objects registered with the Commissioner of Charities.",
                    "Evaluate their second question. Smart Prompt: Push them to question how this decision protects current beneficiary interests versus chasing cash.",
                    "Evaluate their third question. Smart Prompt: Challenge them to critically assess the long-term impact on the charity's mission focus over the next 5-10 years."
                ]
            },
            "2": {
                title: "Principle 2: The charity has an effective Board and Management.",
                dilemma: "The Board Chair has served for 12 years and firmly resists stepping down, citing a 'lack of ready successors'. Key independent directors are frustrated and threatening to resign over the stagnant leadership.\n\n*What is your first question?*",
                challenges: [
                    "Evaluate their first question. Smart Prompt: Push them to challenge the lack of formal succession planning.",
                    "Evaluate their second question. Smart Prompt: Guide them to rigidly enforce governance term limits and board independence rules.",
                    "Evaluate their third question. Smart Prompt: Ask them how they intend to resolve the immediate boardroom conflict objectively."
                ]
            },
            "3": {
                title: "Principle 3: The charity acts responsibly, fairly and with integrity.",
                dilemma: "The Executive Director awarded a lucrative IT contract to a vendor firm owned by his brother-in-law without a tender. Although the price was competitive, no conflict of interest was officially declared.\n\n*What is your first question?*",
                challenges: [
                    "Evaluate their first question. Smart Prompt: Press them on why standard procurement processes completely failed.",
                    "Evaluate their second question. Smart Prompt: Challenge them on the specific severity of the undeclared Conflict of Interest.",
                    "Evaluate their third question. Smart Prompt: Ask how they plan to handle public or donor audits regarding this matter."
                ]
            },
            "4": {
                title: "Principle 4: The charity is well-managed and plans for the future.",
                dilemma: "The charity runs entirely on yearly government grants and currently maintains zero financial reserves. A sudden policy change delays the next grant disbursement by 6 months, leaving the charity unable to make payroll next week.\n\n*What is your first question?*",
                challenges: [
                    "Evaluate their first question. Smart Prompt: Demand they formulate an immediate, drastic contingency strategy.",
                    "Evaluate their second question. Smart Prompt: Press them on why there is absolutely no established reserves policy.",
                    "Evaluate their third question. Smart Prompt: Challenge them on securing a long-term, diversified financial sustainability plan."
                ]
            },
            "5": {
                title: "Principle 5: The charity is accountable and transparent.",
                dilemma: "A server containing sensitive personal data of 2,000 donors was inadvertently exposed online. The Executive Director suggests quietly patching it without notifying the Board or Authorities to avoid jeopardizing a major fundraising campaign.\n\n*What is your first question?*",
                challenges: [
                    "Evaluate their first question. Smart Prompt: Challenge the highly unethical choice of 'hiding' a data leak.",
                    "Evaluate their second question. Smart Prompt: Emphasize the strict, severe legal risks under the Personal Data Protection Act (PDPA).",
                    "Evaluate their third question. Smart Prompt: Push them to mandate a systemic, organization-wide cybersecurity governance overhaul."
                ]
            },
            "6": {
                title: "Principle 6: The charity communicates actively to instil public confidence.",
                dilemma: "A viral social media post falsely accuses your charity of wasting funds on 'lavish staff retreats', utilizing out-of-context photos. Angry donors are flooding your inbox threatening to pull funding, yet the internal comms team remains silent.\n\n*What is your first question?*",
                challenges: [
                    "Evaluate their first question. Smart Prompt: Push them to demand immediate crisis communication facts from the team.",
                    "Evaluate their second question. Smart Prompt: Ask how they intend to transparently and effectively rebuild public trust instantly.",
                    "Evaluate their third question. Smart Prompt: Challenge the internal transparency and policies regarding staff welfare spending."
                ]
            }
        };

        let currentStep = 0; // 0: Init, 1-11: Live Simulation Steps
        let currentScenarioId = null;
        let completedScenarios = [];
        let chatHistory = []; // Tracks data for NotebookLM export

        function autoExportTranscript() {
            if (chatHistory.length === 0) {
                alert("No simulation data to export yet."); return;
            }
            let md = "# PURPOSELY: Governance Pulse Export\n\n*Generated anonymously for internal NotebookLM Contexting.*\n\n---\n";
            let currentScenario = null;
            chatHistory.forEach(log => {
                if (log.scenario !== currentScenario) {
                    md += `\n## ${scenarios[log.scenario]?.title || "Governance Scenario"}\n\n`;
                    currentScenario = log.scenario;
                }
                md += `**[Step ${log.step}] ${log.sender}:** ${log.text.replace(/\\*/g, "")}\n\n`;
            });

            // Seamlessly sync to LocalStorage to eliminate clumsy file uploads
            localStorage.setItem('purposelyTranscript', md);
        }

        function updateBreadcrumb() {
            const tracker = document.getElementById('breadcrumbTracker');
            if (currentStep === 0) {
                tracker.classList.add('hidden');
                return;
            }
            tracker.classList.remove('hidden');
            const barsContainer = document.getElementById('breadcrumbBars');
            let barsHtml = '';
            for (let i = 1; i <= 11; i++) {
                if (i < currentStep) {
                    barsHtml += `<div class="h-1.5 flex-1 bg-teal-500 rounded-full"></div>`;
                } else if (i === currentStep) {
                    barsHtml += `<div class="h-1.5 flex-1 bg-yellow-400 rounded-full animate-pulse"></div>`;
                } else {
                    barsHtml += `<div class="h-1.5 flex-1 bg-slate-700 rounded-full"></div>`;
                }
            }
            barsContainer.innerHTML = barsHtml;
        }

        function renderPrinciples() {
            const container = document.getElementById('principlesContainer');
            if (!container) return;
            let html = '<div class="grid grid-cols-1 gap-3">';
            for (let key in scenarios) {
                const isCompleted = completedScenarios.includes(key);
                html += `
                <button onclick="startSimulation('${key}')" 
                    class="text-left w-full border ${isCompleted ? 'border-slate-800 bg-slate-800' : 'border-slate-500 bg-slate-700 hover:bg-slate-600'} rounded-lg p-3 transition duration-200"
                    ${isCompleted ? 'disabled' : ''}>
                    <div class="${isCompleted ? 'text-gray-500 line-through' : 'text-white font-medium'}">
                        ${scenarios[key].title}
                    </div>
                </button>`;
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function addMessage(text, sender) {
            const chatWindow = document.getElementById('chatWindow');
            const formattedText = text.replace(/\n/g, '<br>');
            chatWindow.innerHTML += `
            <div class="bubble ${sender}">
                ${formattedText}
                <span class="timestamp">${getTime()}</span>
            </div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function addTypingIndicator() {
            const chatWindow = document.getElementById('chatWindow');
            const id = 'typing-' + Date.now();
            chatWindow.innerHTML += `<div id="${id}" class="bubble ai" style="color: #00a884; font-style: italic;">typing...</div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        // Voice Recording Logic
        let isRecording = false;
        let recognition = null;

        function toggleVoice() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert("Your browser does not support voice input. Please use Chrome or Edge.");
                return;
            }

            if (!recognition) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = 'en-SG'; // Opt for Singapore English accuracy
                recognition.continuous = false;
                recognition.interimResults = true;

                recognition.onstart = () => {
                    isRecording = true;
                    document.getElementById('micBtn').style.color = '#00a884'; // Active state
                    document.getElementById('micBtn').classList.add('animate-pulse');
                    document.getElementById('userInput').placeholder = 'Listening...';
                };

                recognition.onresult = (event) => {
                    let text = '';
                    for (let i = 0; i < event.results.length; i++) {
                        text += event.results[i][0].transcript;
                    }
                    document.getElementById('userInput').value = text;
                };

                recognition.onerror = (event) => {
                    console.error("Speech error", event);
                    stopRecording();
                };

                recognition.onend = () => {
                    stopRecording();
                };
            }

            if (isRecording) {
                stopRecording();
            } else {
                recognition.start();
            }
        }

        function stopRecording() {
            if (recognition && isRecording) {
                recognition.stop();
            }
            isRecording = false;
            document.getElementById('micBtn').style.color = '#8696a0';
            document.getElementById('micBtn').classList.remove('animate-pulse');
            document.getElementById('userInput').placeholder = 'Type your question...';
        }

        function startSimulation(scenarioId) {
            document.getElementById('debugDrawer').classList.remove('open');
            document.getElementById('chatWindow').innerHTML = `<div class="w-full flex justify-center mt-2 mb-4"><span class="bg-[#182229] px-4 py-1.5 rounded-lg text-xs text-gray-400 shadow-sm">Assessment Started</span></div>`;
            document.getElementById('userInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('micBtn').disabled = false;
            document.getElementById('userInput').focus();

            currentScenarioId = scenarioId;
            currentStep = 1;
            updateBreadcrumb();

            setTimeout(() => {
                const typingId = addTypingIndicator();
                setTimeout(() => {
                    removeTypingIndicator(typingId);
                    let initialDilemma = `*[P${currentScenarioId} Dilemma]*\n\n${scenarios[currentScenarioId].dilemma}`;
                    addMessage(initialDilemma, 'ai');
                    chatHistory.push({ scenario: currentScenarioId, step: 1, sender: 'PURPOSELY AI', text: initialDilemma });

                    currentStep = 2; // user input for Q1 expected
                    updateBreadcrumb();
                }, 1000);
            }, 500);
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const userText = input.value.trim();
            if (!userText || currentStep === 0) return;

            // Validate that user input is an actual question, but only during the 4 interrogation phases (Steps 2, 4, 6, 8)
            if ([2, 4, 6, 8].includes(currentStep)) {
                const hasQuestionMark = userText.includes('?');
                const hasQuestionWord = /\b(how|what|where|when|why|who)\b/i.test(userText.toLowerCase());

                if (!hasQuestionMark || !hasQuestionWord) {
                    addMessage(userText, 'user');
                    input.value = '';
                    addMessage("⚠️ As a Director using the Question Storming method, you must guide with questions. Please rephrase to include a questioning word (who, what, where, when, why, how) and end with a question mark (?).", 'ai');
                    return;
                }
            }

            let userLabel = '';
            if (currentStep === 2) userLabel = `[P${currentScenarioId}Q1]`;
            else if (currentStep === 4) userLabel = `[P${currentScenarioId}Q2]`;
            else if (currentStep === 6) userLabel = `[P${currentScenarioId}Q3]`;
            else if (currentStep === 8) userLabel = `[P${currentScenarioId}Q4]`;
            else if (currentStep === 10) userLabel = `[P${currentScenarioId} Final Reflection]`;

            let formattedUserText = `*${userLabel}*\n${userText}`;
            addMessage(formattedUserText, 'user');
            chatHistory.push({ scenario: currentScenarioId, step: currentStep, sender: 'Director', text: formattedUserText });
            input.value = '';

            currentStep++; // advances to AI step (3, 5, 7, 9, 11)
            updateBreadcrumb();

            if ([3, 5, 7, 9].includes(currentStep)) {
                const typingId = addTypingIndicator();

                try {
                    const scenario = scenarios[currentScenarioId];

                    // Simulate AI cognitive processing delay
                    await new Promise(r => setTimeout(r, 1800));

                    removeTypingIndicator(typingId);

                    let aiReply = '';
                    if (currentStep === 3) aiReply = `That is a perceptive opening question. Consider this challenge: ${scenario.challenges[0]}\n\nHow would you frame your next question to address this specific risk?`;
                    else if (currentStep === 5) aiReply = `A good pivot towards oversight. However, we must deepen the inquiry: ${scenario.challenges[1]}\n\nWhat structural or reporting evidence would you demand as a Board member to verify this?`;
                    else if (currentStep === 7) aiReply = `You've touched on a critical potential blind spot. The crux of the issue is: ${scenario.challenges[2]}\n\nAs a Director, how would you formally track this risk to ensure it is mitigated before the next quarterly meeting?`;
                    else if (currentStep === 9) aiReply = `You have comprehensively mapped out the operational, strategic, and oversight dimensions of this dilemma. Based on your inquiries, please synthesize your findings.\n\nWhat are your Final Reflexive Thoughts on how we fared in mitigating this risk?`;
                    let aiLabel = '';
                    if (currentStep === 3) aiLabel = `[P${currentScenarioId} Challenge 1]`;
                    if (currentStep === 5) aiLabel = `[P${currentScenarioId} Challenge 2]`;
                    if (currentStep === 7) aiLabel = `[P${currentScenarioId} Challenge 3]`;
                    if (currentStep === 9) aiLabel = `[P${currentScenarioId} Synthesis & Reflection Target]`;

                    let finalReply = `*${aiLabel}*\n\n${aiReply}`;
                    addMessage(finalReply, 'ai');
                    chatHistory.push({ scenario: currentScenarioId, step: currentStep, sender: 'PURPOSELY AI', text: finalReply });

                    currentStep++; // advance to User Step (4, 6, 8, 10)
                    updateBreadcrumb();

                } catch (err) {
                    removeTypingIndicator(typingId);
                    addMessage("⚠️ " + (err.message || "Error generating simulation response."), "ai");
                    currentStep--; // Rollback step on network error
                    updateBreadcrumb();
                }
            } else if (currentStep === 11) {
                const typingId = addTypingIndicator();
                setTimeout(() => {
                    removeTypingIndicator(typingId);
                    let closureMsg = "Thank you for your assessment. Please complete the other 5 principles.";
                    addMessage(closureMsg, 'ai');
                    chatHistory.push({ scenario: currentScenarioId, step: 11, sender: 'PURPOSELY AI', text: closureMsg });

                    document.getElementById('userInput').disabled = true;
                    document.getElementById('sendBtn').disabled = true;
                    document.getElementById('micBtn').disabled = true;

                    if (!completedScenarios.includes(currentScenarioId)) {
                        completedScenarios.push(currentScenarioId);
                    }
                    renderPrinciples();

                    autoExportTranscript();

                    setTimeout(() => {
                        currentStep = 0;
                        updateBreadcrumb();
                        document.getElementById('debugDrawer').classList.add('open');
                    }, 2000);
                }, 1000);
            }
        }

        // Initial render and open drawer
        renderPrinciples();
        document.getElementById('debugDrawer').classList.add('open');
    </script>
</body>

</html>
