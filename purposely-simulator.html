<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PURPOSELY - WhatsApp Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #202c33;
            color: white;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        .phone-container {
            display: flex;
            flex-direction: row;
            gap: 30px;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            max-height: 850px;
            min-height: 600px;
        }

        .phone-frame {
            width: 380px;
            height: 100%;
            background-color: #0b141a;
            border-radius: 40px;
            border: 12px solid #111b21;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
        }

        .whatsapp-header {
            background-color: #202c33;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #2f3b43;
        }

        .chat-bg {
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-color: #0b141a;
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        .bubble.ai {
            background-color: #202c33;
            color: #e9edef;
            align-self: flex-start;
            border-top-left-radius: 0;
            box-shadow: 0 1px 0.5px rgba(11, 20, 26, .13);
        }

        .bubble.user {
            background-color: #005c4b;
            color: #e9edef;
            align-self: flex-end;
            border-top-right-radius: 0;
            box-shadow: 0 1px 0.5px rgba(11, 20, 26, .13);
        }

        .timestamp {
            display: block;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-align: right;
            margin-top: 4px;
        }

        .input-area {
            background-color: #202c33;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 0px;
            flex-shrink: 0;
        }

        .input-box {
            flex: 1;
            background-color: #2a3942;
            border-radius: 24px;
            padding: 12px 20px;
            border: none;
            color: white;
            font-size: 15px;
            resize: none;
            overflow: hidden;
            height: 44px;
            outline: none;
        }

        .send-btn {
            background-color: #00a884;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: white;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background-color: #008f6f;
        }

        /* Debug/Setup Drawer */
        .debug-drawer {
            background: #1e293b;
            border-radius: 16px;
            padding: 30px;
            width: 350px;
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto;
            display: none;
            flex-shrink: 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .debug-drawer.open {
            display: block;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            body {
                padding: 0;
                overflow: hidden;
            }

            .phone-container {
                height: 100dvh;
                max-height: 100dvh;
                min-height: auto;
                gap: 0;
            }

            .phone-frame {
                width: 100%;
                height: 100dvh;
                max-height: none;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }

            .debug-drawer {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100dvh;
                border-radius: 0;
                z-index: 50;
            }
        }
    </style>
</head>

<body>

    <div class="phone-container">
        <!-- Developer Settings Drawer -->
        <div class="debug-drawer" id="debugDrawer">
            <h2 class="text-2xl font-bold text-white mb-6">Simulator Setup</h2>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-400 mb-2">Google Gemini API Key (Local only)</label>
                <input type="password" id="apiKey"
                    class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-sky-500"
                    placeholder="AIza...">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-400 mb-2">Select Scenario</label>
                <select id="scenarioSelect"
                    class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-sky-500">
                    <option value="1">1: Mission & Objectives (Mission Drift)</option>
                    <option value="5">5: Accountability (Data Breach)</option>
                </select>
            </div>
            <button onclick="startSimulation()"
                class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
                Start Weekly Pulse
            </button>
        </div>

        <!-- The Phone -->
        <div class="phone-frame">
            <div class="whatsapp-header">
                <button onclick="document.getElementById('debugDrawer').classList.toggle('open')"
                    class="text-white hover:text-gray-300 mr-4">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <div
                    class="w-10 h-10 rounded-full bg-teal-700 flex items-center justify-content-center text-xl font-bold border border-teal-500 overflow-hidden mr-3">
                    <img src="https://ui-avatars.com/api/?name=Purposely+AI&background=0284c7&color=fff"
                        class="w-full h-full object-cover">
                </div>
                <div class="flex-1">
                    <h2 class="text-white font-semibold text-lg leading-tight">PURPOSELY</h2>
                    <p class="text-gray-400 text-sm leading-tight">Governance Partner • Online</p>
                </div>
            </div>

            <div class="chat-bg" id="chatWindow">
                <div class="w-full flex justify-center mt-2 mb-4">
                    <span class="bg-[#182229] px-4 py-1.5 rounded-lg text-xs text-gray-400 shadow-sm">Today</span>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" class="input-box" placeholder="Type your question..."
                    onkeypress="handleEnter(event)" disabled>
                <button class="send-btn" onclick="sendMessage()" id="sendBtn" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const SYSTEM_PROMPT = `You are the Senior Governance Architect acting as a 'Critical Friend' to a charity board director in Singapore. 
Your tone must be professional, demanding but polite, and deeply contextualized to Singapore's charity sector (Commissioner of Charities, IPC regulations, PDPA, NCSS Code of Governance).
You will receive the scenario dilemma, the current Challenge Stage logic, and the Director's query.
Keep your response under 80 words. Adopt a conversational WhatsApp-friendly tone. Ask EXACTLY ONE challenging follow-up question in return. Do NOT grade or praise them excessively. Challenge them to think deeper.`;

        const scenarios = {
            "1": {
                dilemma: "Hi Director! Here is your dilemma for Week 1: Mission & Objectives.\n\nThe charity (an IPC focused on elderly care) is offered a highly lucrative $500,000 restricted grant from a major corporate donor. However, the strict grant stipulations require the charity to allocate 40% of the funds to launch a brand-new youth mentorship program. The management team is eager to accept. Accepting the grant would require diverting significant staff time away from core elderly care objects. The donor requires an immediate answer.\n\n*What is the first, most critical question you would ask the management team?*",
                challenges: [
                    "Challenge 1 (Relevance): Challenge them to ensure the issue strictly aligns with the core objects and constitution registered with the Commissioner of Charities.",
                    "Challenge 2 (Fiduciary Duty): Challenge them on how this protects assets (like staff time) and fulfills fiduciary duty prioritizing current elderly beneficiaries.",
                    "Challenge 3 (Strategy): Challenge them to look 5-10 years ahead. How does this impact IPC renewal and long-term sector credibility?"
                ]
            },
            "5": {
                dilemma: "Hi Director! Here is your dilemma for Week 5: Accountability.\n\nAn IT vendor informs the ED that a server containing sensitive personal data of 2,000 donors was inadvertently exposed online for three weeks. There is no active evidence of exfiltration, but logs are inconclusive. The ED suggests quietly patching the vulnerability and 'handling it internally' without notifying the Board or the PDPC, arguing that public disclosure would jeopardize upcoming fundraising campaigns.\n\n*What is your immediate, pressing question to the Executive Director?*",
                challenges: [
                    "Challenge 1 (Relevance): Challenge them on whether 'handling it internally' truly serves overarching accountability versus short-term comfort.",
                    "Challenge 2 (Fiduciary Duty): Challenge them specifically on the severe legal and statutory risks under Singapore law (PDPA).",
                    "Challenge 3 (Strategy): Challenge them to move from incident response to systemic change. How does this fundamentally reform cybersecurity governance?"
                ]
            }
        };

        let currentState = 0; // 0: Init, 1: Q1, 2: Q2, 3: Q3, 4: Final
        let currentScenarioId = "1";

        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function addMessage(text, sender) {
            const chatWindow = document.getElementById('chatWindow');
            const formattedText = text.replace(/\n/g, '<br>');

            chatWindow.innerHTML += `
            <div class="bubble ${sender}">
                ${formattedText}
                <span class="timestamp">${getTime()}</span>
            </div>
        `;
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function addTypingIndicator() {
            const chatWindow = document.getElementById('chatWindow');
            const id = 'typing-' + Date.now();
            chatWindow.innerHTML += `
            <div id="${id}" class="bubble ai" style="color: #00a884; font-style: italic;">
                typing...
            </div>
        `;
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function startSimulation() {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) { alert("Please input a Google Gemini API Key to power the simulation."); return; }

            document.getElementById('debugDrawer').classList.remove('open');
            document.getElementById('chatWindow').innerHTML = `<div class="w-full flex justify-center mt-2 mb-4"><span class="bg-[#182229] px-4 py-1.5 rounded-lg text-xs text-gray-400 shadow-sm">Simulation Started</span></div>`;
            document.getElementById('userInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;

            currentScenarioId = document.getElementById('scenarioSelect').value;
            currentState = 1;

            // Send Initial Dilemma
            setTimeout(() => {
                const typingId = addTypingIndicator();
                setTimeout(() => {
                    removeTypingIndicator(typingId);
                    addMessage(scenarios[currentScenarioId].dilemma, 'ai');
                }, 1000);
            }, 500);
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const userText = input.value.trim();
            if (!userText || currentState === 0) return;

            addMessage(userText, 'user');
            input.value = '';

            if (currentState >= 1 && currentState <= 3) {
                const typingId = addTypingIndicator();

                try {
                    const apiKey = document.getElementById('apiKey').value;

                    // Dynamically discover a working model to prevent "not found" region errors
                    let targetModel = "gemini-1.5-flash";
                    try {
                        const modelReq = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                        if (modelReq.ok) {
                            const modelData = await modelReq.json();
                            const availableModels = modelData.models.filter(m => m.supportedGenerationMethods.includes("generateContent") && m.name.includes("gemini"));
                            if (availableModels.length > 0) {
                                // Prefer 1.5 flash, then 1.5 pro, then anything else
                                const flash = availableModels.find(m => m.name.includes("1.5-flash"));
                                if (flash) targetModel = flash.name.replace("models/", "");
                                else targetModel = availableModels[0].name.replace("models/", "");
                            }
                        }
                    } catch (e) { console.warn("ListModels discovery failed, defaulting."); }

                    const scenario = scenarios[currentScenarioId];
                    const logic = scenario.challenges[currentState - 1];

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${apiKey}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: `SYSTEM INSTRUCTIONS:\n${SYSTEM_PROMPT}\n\nSCENARIO: ${scenario.dilemma}\nCHALLENGE RULE: ${logic}\nDIRECTOR'S QUERY: "${userText}"` }]
                            }]
                        })
                    });

                    const data = await response.json();
                    removeTypingIndicator(typingId);

                    if (data.error) {
                        throw new Error(data.error.message || "Google Gemini API Error (Check API Key)");
                    }

                    let aiReply = data.candidates[0].content.parts[0].text;

                    if (currentState === 3) {
                        aiReply += "\n\n*(This concludes the iteration. Please reply with your Final Thoughts on how you will approach this topic moving forward.)*";
                        currentState = 4;
                    } else {
                        currentState++;
                    }

                    addMessage(aiReply, 'ai');

                } catch (err) {
                    removeTypingIndicator(typingId);
                    addMessage("⚠️ " + (err.message || "Error hitting Google Gemini endpoint."), "ai");
                }
            } else if (currentState === 4) {
                const typingId = addTypingIndicator();
                setTimeout(() => {
                    removeTypingIndicator(typingId);
                    addMessage("Thank you for completing this week's governance pulse! Your responses have been anonymized and logged for the Week 8 Evaluation. Have a great week ahead! 🚀", 'ai');
                    document.getElementById('userInput').disabled = true;
                    document.getElementById('sendBtn').disabled = true;
                    currentState = 0;
                }, 1000);
            }
        }

        // Open drawer on load
        document.getElementById('debugDrawer').classList.add('open');
    </script>
</body>

</html>
