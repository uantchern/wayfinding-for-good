<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEC Digital Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Georgia:ital,wght@0,400;0,700;1,400&display=swap');

        body {
            background-color: #F2EFE9;
            color: #1B2B28;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        /* Sticky Header */
        .header-nav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(27, 43, 40, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #D2B48C;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .brand h1 {
            font-family: 'Georgia', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
            color: #F2EFE9;
            letter-spacing: -0.02em;
        }

        .brand span {
            color: #D2B48C;
            font-style: italic;
        }

        .score-display {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(210, 180, 140, 0.1);
            border: 1px solid rgba(210, 180, 140, 0.3);
            border-radius: 99px;
            padding: 0.5rem 1.25rem;
        }

        .score-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #D2B48C;
            font-weight: 600;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        /* Container */
        .main-container {
            max-width: 900px;
            margin: 2rem auto 6rem;
            padding: 0 1.5rem;
        }

        .intro-text {
            text-align: center;
            margin-bottom: 3rem;
            color: #5E5A4B;
        }

        .intro-text h2 {
            font-family: 'Georgia', serif;
            font-size: 2.5rem;
            color: #1B2B28;
            margin-bottom: 1rem;
        }

        /* Principle Blocks */
        .principle-block {
            margin-bottom: 3rem;
        }

        .principle-header {
            font-family: 'Georgia', serif;
            font-size: 1.75rem;
            color: #1B2B28;
            border-bottom: 2px solid #D2B48C;
            padding-bottom: 0.75rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Code ID Cards */
        .code-card {
            background: #fff;
            border: 1px solid rgba(210, 180, 140, 0.4);
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 12px rgba(27, 43, 40, 0.04);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .code-card:hover {
            box-shadow: 0 8px 24px rgba(27, 43, 40, 0.08);
            border-color: #D2B48C;
        }

        .code-card.compliant {
            border-left: 6px solid #10b981;
        }

        .code-card.needs-work {
            border-left: 6px solid #f59e0b;
        }

        .code-header {
            padding: 1.25rem 1.5rem;
            background: rgba(242, 239, 233, 0.5);
            border-bottom: 1px solid rgba(210, 180, 140, 0.2);
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .code-id-badge {
            background: #1B2B28;
            color: #fff;
            font-weight: 700;
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            letter-spacing: 0.05em;
        }

        .code-title {
            font-weight: 600;
            font-size: 1.125rem;
            color: #1B2B28;
            margin: 0;
            flex: 1;
            line-height: 1.4;
        }

        .code-status-icon {
            font-size: 1.25rem;
            color: #cbd5e1;
        }

        .code-card.compliant .code-status-icon {
            color: #10b981;
        }

        .code-card.needs-work .code-status-icon {
            color: #f59e0b;
        }

        /* Checklist Items */
        .question-list {
            padding: 0.5rem 1.5rem 1.5rem;
        }

        .question-item {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding: 1.25rem 0;
            border-bottom: 1px dashed rgba(210, 180, 140, 0.4);
        }

        .question-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .question-text-wrap {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .question-text {
            font-size: 1rem;
            color: #334155;
            flex: 1;
            line-height: 1.5;
        }

        /* Tooltip */
        .info-btn {
            color: #8B7355;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 0.25rem;
            position: relative;
            transition: color 0.2s;
            font-size: 1.1rem;
        }

        .info-btn:hover {
            color: #1B2B28;
        }

        .tooltip {
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: #1B2B28;
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #1B2B28 transparent transparent transparent;
        }

        .info-btn:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }

        /* Radio Buttons */
        .response-options {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }

        .radio-label {
            flex: 1;
            position: relative;
        }

        .radio-label input[type="radio"] {
            display: none;
        }

        .radio-btn {
            display: block;
            text-align: center;
            padding: 0.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .radio-label input[type="radio"]:checked+.radio-btn {
            border-color: #8B7355;
            background: #D2B48C;
            color: #1B2B28;
            box-shadow: 0 2px 4px rgba(210, 180, 140, 0.3);
        }

        .radio-label input[type="radio"][value="No"]:checked+.radio-btn {
            border-color: #ef4444;
            background: #fee2e2;
            color: #b91c1c;
        }

        .radio-label input[type="radio"][value="Partial"]:checked+.radio-btn {
            border-color: #f59e0b;
            background: #fef3c7;
            color: #b45309;
        }

        .radio-label input[type="radio"][value="Yes"]:checked+.radio-btn {
            border-color: #10b981;
            background: #d1fae5;
            color: #047857;
        }

        /* Fixed Action Button */
        .fab-container {
            position: fixed;
            bottom: 2rem;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 40;
            pointer-events: none;
        }

        .action-plan-btn {
            pointer-events: auto;
            background-color: #25D366;
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.125rem;
            font-weight: 700;
            border-radius: 99px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
        }

        .action-plan-btn:hover {
            transform: translateY(-3px);
            background-color: #128C7E;
            box-shadow: 0 15px 35px rgba(37, 211, 102, 0.5);
        }

        @media (max-width: 640px) {
            .header-nav {
                padding: 1rem;
                flex-direction: column;
                gap: 1rem;
            }

            .code-header {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <!-- Fixed Header -->
    <nav class="header-nav">
        <div class="brand">
            <h1>GEC Digital <span>Assistant</span></h1>
        </div>
        <div class="score-display">
            <span class="score-label">Compliance Health</span>
            <span class="score-value" id="healthScore">0%</span>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-container">

        <div class="intro-text">
            <h2>Governance Code Audit</h2>
            <p>Perform a rapid multi-point verification against the full Charity Code of Governance. Toggle responses
                below to automatically calculate compliance and generate a targeted Action Plan for your next board
                meeting.</p>
        </div>

        <div id="gecContainer">
            <!-- Dynamically populated via JS -->
        </div>

    </div>

    <!-- Floating Action Button -->
    <div class="fab-container">
        <button class="action-plan-btn" onclick="generateActionPlan()">
            <i class="fab fa-whatsapp text-xl"></i> Export Target Action Plan
        </button>
    </div>

    <script>
        // Database structured exactly to emulate the Revised Code Toolkit / Spreadsheets
        const GEC_DATA = [
            {
                principle: "Principle 1: Board Governance",
                codeIds: [
                    {
                        id: "1.1",
                        text: "Clearly state the charitable purposes and include them in governing instruments.",
                        questions: [
                            { id: "q1_1_1", text: "Are the charity's formal purposes clearly documented?", ref: "Constitution / Trust Deed" },
                            { id: "q1_1_2", text: "Does the Board review activities annually to ensure alignment with these purposes?", ref: "Board Minutes / Strategy Workplan" }
                        ]
                    },
                    {
                        id: "1.2",
                        text: "Develop and implement strategic plans to achieve stated purposes.",
                        questions: [
                            { id: "q1_2_1", text: "Is there a documented strategic plan?", ref: "Strategic Workplan" },
                            { id: "q1_2_2", text: "Are there clear operational KPIs linked to the overarching plan?", ref: "Management Progress Reports" }
                        ]
                    }
                ]
            },
            {
                principle: "Principle 2: Conflict of Interest",
                codeIds: [
                    {
                        id: "2.1",
                        text: "Documented procedures to declare actual or potential conflicts of interest.",
                        questions: [
                            { id: "q2_1_1", text: "Is there a formal, updated Conflict of Interest policy?", ref: "HR Manual / COI Policy Document" },
                            { id: "q2_1_2", text: "Do Board members sign an annual declaration of interests?", ref: "Signed COI Declarations" },
                            { id: "q2_1_3", text: "Is there proof of recusal during board voting when conflicts arise?", ref: "Board Meeting Minutes" }
                        ]
                    }
                ]
            },
            {
                principle: "Principle 4: Financial Management",
                codeIds: [
                    {
                        id: "4.1",
                        text: "Establish and disclose a targeted reserves policy.",
                        questions: [
                            { id: "q4_1_1", text: "Has the board explicitly approved a target reserves policy (e.g. 6-12 months)?", ref: "Board Meeting Minutes" },
                            { id: "q4_1_2", text: "Is the exact ratio disclosed formally in the annual report?", ref: "Annual Report / Audited Financials" }
                        ]
                    },
                    {
                        id: "4.4",
                        text: "Ensure core internal controls and multi-point authorisations are in place.",
                        questions: [
                            { id: "q4_4_1", text: "Are documented procedures governing all financial transactions clearly updated?", ref: "Standard Operating Procedures (Finance)" },
                            { id: "q4_4_2", text: "Is there strict segregation of duties between payment preparation and authorisation?", ref: "Bank Mandate / Org Chart" },
                            { id: "q4_4_3", text: "Are expense approval limits strictly codified by management tier?", ref: "Delegation of Authority Matrix" }
                        ]
                    }
                ]
            },
            {
                principle: "Principle 5: Transparency and Public Image",
                codeIds: [
                    {
                        id: "5.1",
                        text: "Actively communicate with stakeholders and publish requisite reports.",
                        questions: [
                            { id: "q5_1_1", text: "Is the Annual Report published online reliably within six months of FYE?", ref: "Charity Website" },
                            { id: "q5_1_2", text: "Does the report clearly narrate programs delivered alongside financials?", ref: "Annual Report" }
                        ]
                    },
                    {
                        id: "5.4",
                        text: "Strict compliance with Personal Data Protection Act (PDPA).",
                        questions: [
                            { id: "q5_4_1", text: "Is a Data Protection Officer (DPO) formally appointed and registered?", ref: "PDPC Registration" },
                            { id: "q5_4_2", text: "Is there an active cyber-risk mitigation and data breach policy?", ref: "IT Security Policy / Internal Audit Report" }
                        ]
                    }
                ]
            }
        ];

        // Store answers globally: { "q1_1_1": "Yes", ... }
        const userAnswers = {};

        // Count total possible points (Yes=2, Partial=1, No=0)
        let totalMaxPoints = 0;
        GEC_DATA.forEach(p => {
            p.codeIds.forEach(c => {
                c.questions.forEach(q => {
                    totalMaxPoints += 2; // Max points per question is 2
                });
            });
        });

        // Initialize UI
        function renderAssistant() {
            const container = document.getElementById('gecContainer');
            let html = '';

            GEC_DATA.forEach((principle, pIndex) => {
                html += `
                    <div class="principle-block">
                        <div class="principle-header">
                            <span>${principle.principle}</span>
                        </div>
                `;

                principle.codeIds.forEach((code, cIndex) => {
                    html += `
                        <div class="code-card" id="card_${code.id.replace('.', '_')}">
                            <div class="code-header">
                                <span class="code-id-badge">CODE ID ${code.id}</span>
                                <h3 class="code-title">${code.text}</h3>
                                <i class="fas fa-check-circle code-status-icon" id="icon_${code.id.replace('.', '_')}"></i>
                            </div>
                            <div class="question-list">
                    `;

                    code.questions.forEach((q) => {
                        html += `
                                <div class="question-item">
                                    <div class="question-text-wrap">
                                        <div class="question-text">${q.text}</div>
                                        <button class="info-btn" aria-label="Reference Documentation">
                                            <i class="fas fa-info-circle"></i>
                                            <div class="tooltip"><i class="fas fa-folder-open mr-1"></i> ${q.ref}</div>
                                        </button>
                                    </div>
                                    <div class="response-options">
                                        <label class="radio-label">
                                            <input type="radio" name="${q.id}" value="Yes" onchange="handleResponse('${code.id}', '${q.id}', 'Yes')">
                                            <span class="radio-btn">Yes</span>
                                        </label>
                                        <label class="radio-label">
                                            <input type="radio" name="${q.id}" value="Partial" onchange="handleResponse('${code.id}', '${q.id}', 'Partial')">
                                            <span class="radio-btn">Partial</span>
                                        </label>
                                        <label class="radio-label">
                                            <input type="radio" name="${q.id}" value="No" onchange="handleResponse('${code.id}', '${q.id}', 'No')">
                                            <span class="radio-btn">No</span>
                                        </label>
                                    </div>
                                </div>
                        `;
                    });

                    html += `
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;
            });

            container.innerHTML = html;
        }

        function handleResponse(codeId, questionId, value) {
            userAnswers[questionId] = value;
            updateScore();
            updateCardStatus(codeId);
        }

        function updateScore() {
            let currentPoints = 0;

            // Recalculate based on current userAnswers
            Object.values(userAnswers).forEach(val => {
                if (val === 'Yes') currentPoints += 2;
                if (val === 'Partial') currentPoints += 1;
            });

            let percentage = Math.round((currentPoints / totalMaxPoints) * 100) || 0;
            const healthEl = document.getElementById('healthScore');
            healthEl.innerText = percentage + '%';

            if (percentage >= 80) {
                healthEl.style.color = '#10b981'; // Green
            } else if (percentage >= 50) {
                healthEl.style.color = '#f59e0b'; // Orange
            } else if (percentage > 0) {
                healthEl.style.color = '#ef4444'; // Red
            } else {
                healthEl.style.color = '#fff';
            }
        }

        function updateCardStatus(codeId) {
            // Find the logic array for this codeId
            let tCode = null;
            GEC_DATA.forEach(p => {
                p.codeIds.forEach(c => {
                    if (c.id === codeId) tCode = c;
                });
            });

            if (!tCode) return;

            let allYes = true;
            let anyAnswered = false;

            tCode.questions.forEach(q => {
                let ans = userAnswers[q.id];
                if (ans) anyAnswered = true;
                if (ans !== 'Yes') allYes = false;
            });

            const cardId = 'card_' + codeId.replace('.', '_');
            const cardEl = document.getElementById(cardId);

            if (cardEl) {
                cardEl.classList.remove('compliant', 'needs-work');
                if (anyAnswered) {
                    if (allYes) {
                        cardEl.classList.add('compliant');
                    } else {
                        // If any question is answered but not all are Yes (meaning Partial or No exists, or some unanswered)
                        cardEl.classList.add('needs-work');
                    }
                }
            }
        }

        function generateActionPlan() {
            let actionItems = [];
            let unassessedCount = 0;

            GEC_DATA.forEach(p => {
                p.codeIds.forEach(c => {
                    c.questions.forEach(q => {
                        let ans = userAnswers[q.id];
                        if (ans === 'No' || ans === 'Partial') {
                            actionItems.push(`■ *Code ID ${c.id}:* Needs [${q.ref}]. (Status: ${ans})`);
                        } else if (!ans) {
                            unassessedCount++;
                        }
                    });
                });
            });

            if (Object.keys(userAnswers).length === 0) {
                alert("Please answer at least one question to generate an Action Plan.");
                return;
            }

            let text = `*Governance Evaluation Action Plan*\n`;
            text += `_Generated by GEC Digital Assistant_\n\n`;

            const score = document.getElementById('healthScore').innerText;
            text += `*Current Health Score:* ${score}\n\n`;

            if (actionItems.length === 0) {
                text += `*All assessed areas are compliant!* Excellent work.`;
                if (unassessedCount > 0) {
                    text += `\n(Note: ${unassessedCount} items remain unassessed)`;
                }
            } else {
                text += `*⚠️ Core Action Items Required:*\n`;
                text += actionItems.join('\n');

                text += `\n\n_Let's discuss and locate the missing documentation at the next management meeting._`;
            }

            const encodedText = encodeURIComponent(text);
            window.open(`https://wa.me/?text=${encodedText}`, '_blank');
        }

        // Run on load
        window.onload = renderAssistant;
    </script>
</body>

</html>
